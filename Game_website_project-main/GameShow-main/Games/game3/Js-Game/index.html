</head>
<body style="background-color: rgba(59, 158, 158, 0.986);">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark p-3"style="width:100%;margin-top:0px">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Gamics</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    
      <div class=" collapse navbar-collapse hh" id="navbarNavDropdown">
        <ul class="navbar-nav ms-auto ">
          <li class="nav-item">
            <a class="nav-link mx-2 oo "  href="/Game_website_project-main/gamics-master/index.html" style="color: white;">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link mx-2 oo" href="/Game_website_project-main/gamics-master/index.html#game2" style="color: white;">Game</a>

          <li class="nav-item">
            <a class="nav-link mx-2 oo" href="/Game_website_project-main/gamics-master/index.html#features" style="color: white;">Features</a>

          <li class="nav-item">

      </div>
    </div>
    </nav>
  <!-- select box -->
  <div class="select-box" >
    <header>Tic Tac Toe</header>
    <div class="content">
      <div class="title">Select which you want to be?</div>
      <div class="options">
        <button class="playerX">Player (X)</button>
        <button class="playerO">Player (O)</button>
      </div>
      <div class="credit">Created By <a style="color: #56baed;">3CS Junior</a></div>
    </div>
  </div> 

  <!-- playboard section -->
  <div class="play-board">
    <div class="details">
      <div class="players">
        <span class="Xturn">X's Turn</span>
        <span class="Oturn">O's Turn</span>
        <div class="slider"></div>
      </div>
    </div>
    <div class="play-area">
      <section>
        <span class="box1"></span>
        <span class="box2"></span>
        <span class="box3"></span>
      </section>
      <section>
        <span class="box4"></span>
        <span class="box5"></span>
        <span class="box6"></span>
      </section>
      <section>
        <span class="box7"></span>
        <span class="box8"></span>
        <span class="box9"></span>
      </section>
    </div>
  </div>

  <!-- result box -->
  <div class="result-box">
    <div class="won-text"></div>
    <div class="btn"><button>Replay</button></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
